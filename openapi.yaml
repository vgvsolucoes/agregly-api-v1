# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: apikey
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    Select:
      name: select
      in: query
      description: "Columns to return (e.g. `id,email,created_at`)"
      schema:
        type: string
    Order:
      name: order
      in: query
      description: "Order results (e.g. `created_at.desc`)"
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of rows to return
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      description: Row offset for pagination
      schema:
        type: integer
        default: 0

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          example:
            message: "JWT expired"
            hint: "Provide a valid Bearer token or apikey"
    BadRequest:
      description: Bad request / validation error
      content:
        application/json:
          example:
            code: "23502"
            message: "null value in column violates not-null constraint"

  schemas:

    # ── PROFILE ──
    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        email:
          type: string
        plan_type:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time
        free_messages_used:
          type: integer
        subscription_plan:
          type: string
        is_superadmin:
          type: boolean
        updated_at:
          type: string
          format: date-time
        referral_code:
          type: string
        extra_messages_balance:
          type: integer
        referred_by:
          type: string
          nullable: true
        subscription_status:
          type: string
        cancellation_date:
          type: string
          format: date-time
          nullable: true
        access_until:
          type: string
          format: date-time
          nullable: true
        user_type:
          type: string
        niche:
          type: string
        plan:
          type: string
        monthly_videos_generated:
          type: integer
        monthly_videos_remaining:
          type: integer
        selected_avatar_id:
          type: string
          nullable: true
        referral_count:
          type: integer
        bonus_messages:
          type: integer
        meta_connected_at:
          type: string
          format: date-time
          nullable: true
        linkedin_name:
          type: string
          nullable: true
        linkedin_email:
          type: string
          nullable: true
        content_profiles:
          type: object
          nullable: true
        active_content_profile:
          type: string
          nullable: true
        subscription_tier:
          type: string
        daily_message_reset:
          type: string
          format: date-time
          nullable: true
        last_message_reset:
          type: string
          format: date-time
          nullable: true
        most_used_feature:
          type: string
          nullable: true
        professional_niche:
          type: string
          nullable: true
        meta_access_token:
          type: string
          nullable: true
        instagram_username:
          type: string
          nullable: true
        meta_token_expires_at:
          type: string
          format: date-time
          nullable: true
        whatsapp_business_phone:
          type: string
          nullable: true
        meta_connection_status:
          type: string
        has_seen_onboarding:
          type: boolean
        subscription_expires_at:
          type: string
          format: date-time
          nullable: true
        is_premium:
          type: boolean
        premium_granted_at:
          type: string
          format: date-time
          nullable: true
        linkedin_access_token:
          type: string
          nullable: true
        linkedin_user_id:
          type: string
          nullable: true
        linkedin_connected_at:
          type: string
          format: date-time
          nullable: true
    ProfileCreate:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        plan_type:
          type: string
        role:
          type: string
        niche:
          type: string
        plan:
          type: string

    # ── CHAT ──
    Chat:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        model_type:
          type: string
        is_pinned:
          type: boolean
    ChatCreate:
      type: object
      required: [user_id]
      properties:
        title:
          type: string
        user_id:
          type: string
          format: uuid
        model_type:
          type: string
        is_pinned:
          type: boolean

    # ── MESSAGE ──
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chat_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        created_at:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        model_type:
          type: string
        conversation_id:
          type: string
          format: uuid
          nullable: true
        file_url:
          type: string
          nullable: true
        file_type:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        analysis_result:
          type: string
          nullable: true
        analysis_model:
          type: string
          nullable: true
        feature_type:
          type: string
    MessageCreate:
      type: object
      required: [chat_id, role, content, user_id]
      properties:
        chat_id:
          type: string
          format: uuid
        role:
          type: string
        content:
          type: string
        user_id:
          type: string
          format: uuid
        model_type:
          type: string
        feature_type:
          type: string

    # ── CONVERSATION ──
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        is_pinned:
          type: boolean
